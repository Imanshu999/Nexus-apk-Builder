name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    # यह स्टेप .env और local.properties दोनों में नकली API Key डाल देगा ताकि कंपाइल एरर न आए
    - name: Create Environment Files
      run: |
        echo "GEMINI_API_KEY=\"dummy_api_key_for_building\"" > .env
        echo "GEMINI_API_KEY=dummy_api_key_for_building" > local.properties

    # यह स्टेप एरर को रोकने के लिए डिबग कीस्टोर बनाएगा
    - name: Generate Fake Debug Keystore
      run: |
        keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

    # यहाँ हमने पर्यावरण वेरिएबल (env) में भी की पास कर दी है
    - name: Build Debug APK
      env:
        GEMINI_API_KEY: "dummy_api_key_for_building"
      run: gradle assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
